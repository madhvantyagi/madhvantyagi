name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Generate themed contribution-grid snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake-dark.svg?color_snake=#ef4444&color_dots=#0D1117,#450a0a,#7f1d1d,#b91c1c,#dc2626
            dist/github-snake.svg?color_snake=#ef4444&color_dots=#ffffff,#fee2e2,#fecaca,#f87171,#ef4444

      - name: Publish SVGs to the `output` branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: output
          keep_files: true
