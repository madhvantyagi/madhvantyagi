name: Generate Snake

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Generate themed contribution-grid snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake-dark.svg?color_snake=c084fc&color_dots=#0D1117,#1e3a8a,#2563eb,#3b82f6,#60a5fa
            dist/github-snake.svg?color_snake=7c3aed&color_dots=#ffffff,#dbeafe,#93c5fd,#3b82f6,#1d4ed8

      - name: Publish SVGs to the `output` branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: output
          keep_files: true
